<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jersey Store | Catálogo Exclusivo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;
  --accent:#e63946;--accent2:#ff6b6b;
  --text:#f0f0f0;--muted:#8888aa;--border:#2a2a3a;
  --card:#1e1e28;--card-hover:#252530;
  --green:#2ecc71;--sidebar:260px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,#0f0f13 0%,#1a0520 50%,#0a0a20 100%);
}
.login-box{
  background:rgba(26,26,34,0.95);border:1px solid var(--border);
  border-radius:24px;padding:48px 40px;width:100%;max-width:420px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}
.login-logo{text-align:center;margin-bottom:8px}
.login-logo svg{width:64px;height:64px}
.login-title{text-align:center;font-size:28px;font-weight:800;margin-bottom:4px;
  background:linear-gradient(135deg,#fff,#cc99ff);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent}
.login-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
.form-label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.form-input{
  width:100%;padding:14px 16px;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-size:16px;transition:.2s;outline:none;
  -webkit-appearance:none;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,57,70,.2)}
.form-group{margin-bottom:20px}
.btn-login{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--accent),#c0392b);
  color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;
  cursor:pointer;margin-top:8px;transition:.2s;letter-spacing:.5px;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(230,57,70,.4)}
.btn-login:active{transform:translateY(0)}
.login-error{
  color:var(--accent2);font-size:13px;text-align:center;
  margin-top:12px;min-height:20px;
}
.login-hint{color:var(--muted);font-size:12px;text-align:center;margin-top:16px}

/* ── APP ── */
#app{display:none;min-height:100vh;flex-direction:column}

/* navbar */
.navbar{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,19,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:64px;display:flex;align-items:center;gap:16px;
}
.nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-brand-icon{width:36px;height:36px;background:var(--accent);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-brand-text{font-weight:800;font-size:18px}
.nav-brand-sub{font-size:11px;color:var(--muted);font-weight:400}
.search-bar{
  flex:1;max-width:520px;position:relative;
}
.search-bar input{
  width:100%;padding:10px 16px 10px 42px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:50px;color:var(--text);font-size:15px;outline:none;transition:.2s;
}
.search-bar input:focus{border-color:var(--accent);background:var(--surface)}
.search-bar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);width:16px;height:16px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-cart{
  position:relative;background:var(--surface2);border:1px solid var(--border);
  border-radius:50px;padding:8px 16px;cursor:pointer;
  display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;
  transition:.2s;
}
.btn-cart:hover{background:var(--surface);border-color:var(--accent)}
.cart-badge{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#fff;
  font-size:11px;font-weight:700;width:20px;height:20px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.btn-logout{
  background:transparent;border:1px solid var(--border);
  border-radius:50px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--muted);
  transition:.2s;
}
.btn-logout:hover{border-color:var(--accent);color:var(--accent)}
.user-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#9b59b6);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;flex-shrink:0;
}

/* layout */
.layout{display:flex;flex:1}

/* sidebar */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  padding:24px 0;overflow-y:auto;position:sticky;
  top:64px;height:calc(100vh - 64px);
}
.sidebar-section{margin-bottom:8px}
.sidebar-title{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--muted);padding:0 20px;margin-bottom:8px;
}
.sidebar-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;cursor:pointer;transition:.15s;
  border-left:3px solid transparent;font-size:14px;
}
.sidebar-item:hover{background:var(--surface2);color:#fff}
.sidebar-item.active{
  background:rgba(230,57,70,.1);border-left-color:var(--accent);
  color:var(--accent);font-weight:600;
}
.sidebar-item .cat-count{
  background:var(--surface2);color:var(--muted);
  font-size:11px;padding:2px 8px;border-radius:50px;
}
.sidebar-item.active .cat-count{background:rgba(230,57,70,.2);color:var(--accent)}

/* main */
.main{flex:1;padding:28px;min-width:0}
.main-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.main-title{font-size:22px;font-weight:800}
.main-count{color:var(--muted);font-size:14px;margin-top:2px}
.sort-select{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:8px 14px;color:var(--text);font-size:14px;outline:none;
}

/* grid */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.product-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;cursor:pointer;
  transition:.25s;position:relative;
}
.product-card:hover{
  transform:translateY(-6px);border-color:var(--accent);
  box-shadow:0 16px 40px rgba(230,57,70,.2);
}
.card-img-wrap{
  position:relative;padding-top:100%;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
  overflow:hidden;
}
.card-img-wrap img{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;transition:.4s;opacity:0;
}
.card-img-wrap img.img-ok{opacity:1}
.card-img-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  color:rgba(255,255,255,0.18);font-size:36px;pointer-events:none;
}
.card-img-placeholder span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.12)}
.product-card:hover .card-img-wrap img.img-ok{transform:scale(1.08)}
.card-category{
  position:absolute;top:10px;left:10px;
  background:rgba(15,15,19,.85);backdrop-filter:blur(4px);
  color:var(--muted);font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px;
}
.card-body{padding:14px}
.card-name{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-price{font-size:16px;font-weight:800;color:var(--accent)}
.card-price.empty{color:var(--muted);font-size:13px;font-weight:400}
.btn-add{
  width:100%;padding:9px;margin-top:10px;
  background:linear-gradient(135deg,var(--accent),#c0392b);
  color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.btn-add:hover{opacity:.9}
.btn-add.added{background:var(--green)}

/* No results */
.no-results{
  grid-column:1/-1;text-align:center;padding:80px 20px;
}
.no-results-icon{font-size:60px;margin-bottom:16px}
.no-results h3{font-size:20px;margin-bottom:8px}
.no-results p{color:var(--muted)}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;max-width:480px;width:100%;
  max-height:90vh;overflow-y:auto;
}
.modal-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:16px 16px 0 0}
.modal-body{padding:24px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:6px}
.modal-cat{color:var(--muted);font-size:13px;margin-bottom:16px}
.modal-price{font-size:28px;font-weight:800;color:var(--accent);margin-bottom:16px}
.modal-desc{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:20px}
.size-label{font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.size-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.size-btn{
  padding:6px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;font-size:14px;transition:.15s;
}
.size-btn:hover,.size-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.qty-btn{
  width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;font-size:20px;display:flex;
  align-items:center;justify-content:center;transition:.15s;
}
.qty-btn:hover{background:var(--accent);border-color:var(--accent)}
.qty-val{font-size:18px;font-weight:700;min-width:30px;text-align:center}
.modal-actions{display:flex;gap:10px}
.btn-primary{
  flex:1;padding:14px;background:linear-gradient(135deg,var(--accent),#c0392b);
  color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.btn-primary:hover{opacity:.9}
.btn-secondary{
  padding:14px 20px;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;cursor:pointer;font-size:15px;color:var(--text);transition:.2s;
}
.btn-secondary:hover{border-color:var(--accent)}

/* cart panel */
.cart-panel{
  position:fixed;right:0;top:0;height:100vh;width:360px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:300;transform:translateX(100%);transition:.3s;
  display:flex;flex-direction:column;
}
.cart-panel.open{transform:translateX(0)}
.cart-header{
  padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-header h3{font-size:18px;font-weight:800}
.btn-close{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;cursor:pointer;font-size:18px;
  color:var(--muted);transition:.15s;
}
.btn-close:hover{color:#fff}
.cart-items{flex:1;overflow-y:auto;padding:16px 24px}
.cart-item{
  display:flex;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.cart-item img{width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:600;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-meta{color:var(--muted);font-size:12px;margin-bottom:4px}
.cart-item-price{color:var(--accent);font-weight:700;font-size:13px}
.btn-rm{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;padding:0 4px;flex-shrink:0;transition:.15s}
.btn-rm:hover{color:var(--accent)}
.cart-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.cart-footer{padding:20px 24px;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;font-weight:700;
  font-size:18px;margin-bottom:16px}
.btn-whatsapp{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:.2s;
}
.btn-whatsapp:hover{opacity:.9;transform:translateY(-2px)}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--green);color:#fff;padding:12px 24px;border-radius:50px;
  font-weight:700;z-index:9999;transition:.3s;font-size:14px;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* responsive */
@media(max-width:768px){
  :root{--sidebar:0px}
  .sidebar{display:none}
  .layout{flex-direction:column}
  .main{padding:16px}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .search-bar{max-width:100%;flex:1}
  .nav-brand-sub{display:none}
  .cart-panel{width:100%;max-width:100%}
  .modal-box{max-width:100%;border-radius:16px}
  
  /* Mobile filter bar */
  .mobile-cats{
    display:flex;overflow-x:auto;gap:8px;padding:12px 16px;
    background:var(--surface);border-bottom:1px solid var(--border);
    scrollbar-width:none;
  }
  .mobile-cats::-webkit-scrollbar{display:none}
  .mobile-cat-btn{
    flex-shrink:0;padding:7px 16px;
    background:var(--surface2);border:1px solid var(--border);
    border-radius:50px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.15s;
  }
  .mobile-cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
}
@media(min-width:769px){.mobile-cats{display:none}}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:32px;flex-wrap:wrap}
.page-btn{
  padding:8px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;font-size:14px;transition:.15s;
}
.page-btn:hover{border-color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.page-btn:disabled{opacity:.4;cursor:default}
</style>
</head>

<!-- ══════════════════════════════════════════
     JAVASCRIPT PRINCIPAL
═══════════════════════════════════════════ -->
<script>
'use strict';

var ADMIN_PASS = '125670Carlos';
var ADMIN_PHONE = '3343745531';
var ADMIN_NAME = 'Carlos Adrian Luevano Alatorre';
var WA_NUMBER = '523343745531';

/* ── STATE ── */
var state = {
  user: null,
  products: [],
  filtered: [],
  cart: [],
  category: 'all',
  search: '',
  sort: 'default',
  page: 1,
  perPage: 48,
  modalProduct: null,
  modalSize: null,
  modalQty: 1,
};

/* ── UTILS ── */
function $(id){ return document.getElementById(id); }
function show(id){ var el=$(id); if(el) el.style.display=''; }
function hide(id){ var el=$(id); if(el) el.style.display='none'; }
function showFlex(id){ var el=$(id); if(el) el.style.display='flex'; }

function showToast(msg, color){
  var t=$('toast'); t.textContent=msg;
  t.style.background=color||'#2ecc71';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

/* ── STORAGE ── */
function saveCart(){ try{ localStorage.setItem('js_cart', JSON.stringify(state.cart)); }catch(e){} }
function loadCart(){
  try{ var c=localStorage.getItem('js_cart'); if(c) state.cart=JSON.parse(c)||[]; }catch(e){}
}

/* ── LOGIN ── */
function initLogin(){
  $('btn-enter').addEventListener('click', doLogin);
  $('lk').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  $('lp').addEventListener('keydown', function(e){ if(e.key==='Enter') $('lk').focus(); });
  
  // Restaurar sesión
  try{
    var saved = localStorage.getItem('js_user');
    if(saved){ var u=JSON.parse(saved); if(u&&u.phone){ startApp(u); return; } }
  }catch(e){}
}

function doLogin(){
  var phone = ($('lp').value||'').trim().replace(/\D/g,'');
  var pass  = ($('lk').value||'').trim();
  var errEl = $('login-error');
  errEl.textContent='';

  if(!phone){ errEl.textContent='Ingresa tu número de teléfono'; return; }
  if(!pass){  errEl.textContent='Ingresa tu contraseña'; return; }

  // Admin directo
  if(phone===ADMIN_PHONE){
    if(pass!==ADMIN_PASS){ errEl.textContent='Contraseña incorrecta'; return; }
    var adminUser={phone:phone, name:ADMIN_NAME, isAdmin:true};
    try{ localStorage.setItem('js_user', JSON.stringify(adminUser)); }catch(e){}
    startApp(adminUser);
    return;
  }

  // Usuarios registrados
  var users=[];
  try{ users=JSON.parse(localStorage.getItem('js_users')||'[]'); }catch(e){}
  var existing=users.find(function(u){ return u.phone===phone; });

  if(existing){
    if(existing.pass!==btoa(pass)){ errEl.textContent='Contraseña incorrecta'; return; }
    existing.lastLogin=new Date().toISOString();
    try{ localStorage.setItem('js_users', JSON.stringify(users)); }catch(e){}
    try{ localStorage.setItem('js_user', JSON.stringify(existing)); }catch(e){}
    startApp(existing);
  } else {
    // Nuevo usuario
    var nu={phone:phone,name:'Cliente '+phone.slice(-4),pass:btoa(pass),
            created:new Date().toISOString(),lastLogin:new Date().toISOString(),isAdmin:false};
    users.push(nu);
    try{ localStorage.setItem('js_users', JSON.stringify(users)); }catch(e){}
    try{ localStorage.setItem('js_user', JSON.stringify(nu)); }catch(e){}
    startApp(nu);
  }
}

function startApp(user){
  state.user=user;
  $('login-screen').style.display='none';
  $('app').style.display='flex';
  $('app').style.flexDirection='column';
  
  var initials=(user.name||'').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||user.phone.slice(-2);
  $('user-avatar').textContent=initials;
  $('nav-sub').textContent=user.isAdmin?'⚙ Administrador':'Catálogo 2024-2026';
  
  loadCart();
  initApp();
}

/* ── CATALOG ── */
function initApp(){
  state.products = (window.CATALOG_SEED||[]).slice();
  if(state.products.length===0){
    $('products-grid').innerHTML='<div class="no-results"><div class="no-results-icon">📦</div><h3>Sin productos</h3><p>Recarga la página</p></div>';
    return;
  }
  buildSidebar();
  buildMobileCats();
  applyFilters();
  updateCartBadge();
}

/* categories */
function getCategories(){
  var cats={};
  state.products.forEach(function(p){
    var c=p.category||'General';
    cats[c]=(cats[c]||0)+1;
  });
  return cats;
}

function buildSidebar(){
  var cats=getCategories();
  var html='<div class="sidebar-section"><div class="sidebar-title">Categorías</div>';
  html+='<div class="sidebar-item '+(state.category==='all'?'active':'')+'" data-cat="all">';
  html+='<span>🏠 Todos</span><span class="cat-count">'+state.products.length+'</span></div>';
  
  var icons={'Liga MX':'🇲🇽','Selecciones':'🌍','Europa - Clubes':'🏆',
    'Retro Europa':'🏛','Retro Liga MX':'🎞','Retros - Barcelona':'🔵',
    'Versión jugador':'⭐','Versión fan':'👕','Femenino':'♀',
    'Sachets / Jackets':'🧥','Playeras de Béisbol':'⚾','Anime / Especial':'🎌','Shorts':'🩳'};

  Object.keys(cats).sort().forEach(function(cat){
    var icon=icons[cat]||'👕';
    var active=state.category===cat?'active':'';
    html+='<div class="sidebar-item '+active+'" data-cat="'+escapeAttr(cat)+'">';
    html+='<span>'+icon+' '+escapeHtml(cat)+'</span>';
    html+='<span class="cat-count">'+cats[cat]+'</span></div>';
  });
  html+='</div>';
  $('sidebar').innerHTML=html;
  $('sidebar').querySelectorAll('.sidebar-item').forEach(function(el){
    el.addEventListener('click', function(){
      state.category=this.dataset.cat; state.page=1; applyFilters(); buildSidebar(); buildMobileCats();
    });
  });
}

function buildMobileCats(){
  var cats=getCategories();
  var html='<button class="mobile-cat-btn '+(state.category==='all'?'active':'')+'" data-cat="all">Todos</button>';
  Object.keys(cats).sort().forEach(function(cat){
    var active=state.category===cat?'active':'';
    html+='<button class="mobile-cat-btn '+active+'" data-cat="'+escapeAttr(cat)+'">'+escapeHtml(cat)+'</button>';
  });
  $('mobile-cats').innerHTML=html;
  $('mobile-cats').querySelectorAll('.mobile-cat-btn').forEach(function(el){
    el.addEventListener('click', function(){
      state.category=this.dataset.cat; state.page=1; applyFilters(); buildSidebar(); buildMobileCats();
    });
  });
}

/* filter + render */
function applyFilters(){
  var q=state.search.toLowerCase();
  var filtered=state.products.filter(function(p){
    if(state.category!=='all'&&p.category!==state.category) return false;
    if(q&&!(p.name||'').toLowerCase().includes(q)&&
          !(p.category||'').toLowerCase().includes(q)&&
          !(p.description||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // sort
  if(state.sort==='az') filtered.sort(function(a,b){return (a.name||'').localeCompare(b.name||'')});
  if(state.sort==='za') filtered.sort(function(a,b){return (b.name||'').localeCompare(a.name||'')});
  if(state.sort==='price_asc') filtered.sort(function(a,b){return parseFloat(a.price||0)-parseFloat(b.price||0)});
  if(state.sort==='price_desc') filtered.sort(function(a,b){return parseFloat(b.price||0)-parseFloat(a.price||0)});

  state.filtered=filtered;
  $('main-title').textContent = state.category==='all'?'Todos los productos':state.category;
  $('main-count').textContent = filtered.length+' productos';
  renderPage();
  renderPagination();
}

function renderPage(){
  var start=(state.page-1)*state.perPage;
  var pageItems=state.filtered.slice(start, start+state.perPage);
  if(pageItems.length===0){
    $('products-grid').innerHTML='<div class="no-results"><div class="no-results-icon">🔍</div><h3>Sin resultados</h3><p>Prueba con otro filtro o búsqueda</p></div>';
    return;
  }
  $('products-grid').innerHTML=pageItems.map(renderCard).join('');
  $('products-grid').querySelectorAll('.product-card').forEach(function(el){
    el.addEventListener('click', function(){ openModal(parseInt(this.dataset.id)); });
  });
  $('products-grid').querySelectorAll('.btn-add').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      quickAdd(parseInt(this.dataset.id));
    });
  });
}

function renderCard(p){
  var price=p.price?'$'+p.price:'Consultar precio';
  var priceClass=p.price?'card-price':'card-price empty';
  var img=p.thumb||p.image||'';
  return '<div class="product-card" data-id="'+p.id+'">'
    +'<div class="card-img-wrap">'
    +'<div class="card-img-placeholder">👕<span>'+escapeHtml(p.category||'')+ '</span></div>'
    +(img?'<img src="'+escapeAttr(img)+'" alt="'+escapeAttr(p.name)+'" loading="lazy" onload="this.classList.add(\'img-ok\')" onerror="this.remove()"/>':'')
    +'<div class="card-category">'+escapeHtml(p.category||'')+'</div>'
    +'</div>'
    +'<div class="card-body">'
    +'<div class="card-name">'+escapeHtml(p.name||'')+'</div>'
    +'<div class="'+priceClass+'">'+escapeHtml(price)+'</div>'
    +'<button class="btn-add" data-id="'+p.id+'">+ Agregar</button>'
    +'</div></div>';
}

function renderPagination(){
  var total=Math.ceil(state.filtered.length/state.perPage);
  if(total<=1){ $('pagination').innerHTML=''; return; }
  var html='';
  html+='<button class="page-btn"'+(state.page===1?' disabled':'')+' data-p="'+(state.page-1)+'">← Ant</button>';
  
  var start=Math.max(1,state.page-2), end=Math.min(total,state.page+2);
  if(start>1) html+='<button class="page-btn" data-p="1">1</button>'+(start>2?'<span style="color:var(--muted)">…</span>':'');
  for(var i=start;i<=end;i++){
    html+='<button class="page-btn'+(i===state.page?' active':'')+'" data-p="'+i+'">'+i+'</button>';
  }
  if(end<total) html+=(end<total-1?'<span style="color:var(--muted)">…</span>':'')+'<button class="page-btn" data-p="'+total+'">'+total+'</button>';
  html+='<button class="page-btn"'+(state.page===total?' disabled':'')+' data-p="'+(state.page+1)+'">Sig →</button>';
  
  $('pagination').innerHTML=html;
  $('pagination').querySelectorAll('.page-btn:not([disabled])').forEach(function(el){
    el.addEventListener('click', function(){
      state.page=parseInt(this.dataset.p); renderPage(); renderPagination();
      window.scrollTo({top:64,behavior:'smooth'});
    });
  });
}

/* ── MODAL ── */
var SIZES=['XS','S','M','L','XL','2XL','3XL'];
function openModal(id){
  var p=state.products.find(function(x){return x.id===id;});
  if(!p) return;
  state.modalProduct=p; state.modalSize=null; state.modalQty=1;
  $('modal-img').src=p.image||p.thumb||'';
  $('modal-name').textContent=p.name||'';
  $('modal-cat').textContent=p.category||'';
  $('modal-price').textContent=p.price?'$'+p.price:'Consultar precio';
  $('modal-price').style.color=p.price?'var(--accent)':'var(--muted)';
  $('modal-desc').textContent=p.description||'';
  $('modal-desc').style.display=p.description?'':'none';
  $('qty-val').textContent='1';
  
  $('size-grid').innerHTML=SIZES.map(function(s){
    return '<button class="size-btn" data-size="'+s+'">'+s+'</button>';
  }).join('');
  $('size-grid').querySelectorAll('.size-btn').forEach(function(el){
    el.addEventListener('click', function(){
      $('size-grid').querySelectorAll('.size-btn').forEach(function(b){b.classList.remove('selected');});
      this.classList.add('selected');
      state.modalSize=this.dataset.size;
    });
  });
  
  $('modal').style.display='flex';
}

function closeModal(){ $('modal').style.display='none'; }

/* ── CART ── */
function quickAdd(id){
  var p=state.products.find(function(x){return x.id===id;});
  if(!p) return;
  addToCart(p,'M',1);
  showToast('✓ '+p.name.slice(0,30)+' agregado');
}

function addToCart(p, size, qty){
  var key=p.id+'_'+(size||'M');
  var existing=state.cart.find(function(x){return x.key===key;});
  if(existing){ existing.qty+=qty; }
  else { state.cart.push({key:key,id:p.id,name:p.name,image:p.thumb||p.image||'',
    category:p.category,price:p.price,size:size||'M',qty:qty}); }
  saveCart();
  updateCartBadge();
}

function updateCartBadge(){
  var total=state.cart.reduce(function(a,x){return a+x.qty;},0);
  var badge=$('cart-badge');
  if(total>0){badge.style.display='flex';badge.textContent=total;}
  else badge.style.display='none';
  $('cart-label').textContent=total>0?'('+total+')':'Carrito';
}

function renderCartPanel(){
  var list=$('cart-items-list');
  if(state.cart.length===0){
    list.innerHTML='<div class="cart-empty">🛒<br>Tu carrito está vacío</div>';
    $('cart-footer').style.display='none';
    return;
  }
  list.innerHTML=state.cart.map(function(item){
    return '<div class="cart-item">'
      +(item.image?'<img src="'+escapeAttr(item.image)+'" alt=""/>':'<div style="width:60px;height:60px;background:var(--surface2);border-radius:8px;flex-shrink:0"></div>')
      +'<div class="cart-item-info">'
      +'<div class="cart-item-name">'+escapeHtml(item.name)+'</div>'
      +'<div class="cart-item-meta">Talla: '+item.size+' · Qty: '+item.qty+'</div>'
      +(item.price?'<div class="cart-item-price">$'+item.price+' c/u</div>':'')
      +'</div>'
      +'<button class="btn-rm" data-key="'+escapeAttr(item.key)+'">🗑</button>'
      +'</div>';
  }).join('');
  
  list.querySelectorAll('.btn-rm').forEach(function(el){
    el.addEventListener('click', function(){
      var key=this.dataset.key;
      state.cart=state.cart.filter(function(x){return x.key!==key;});
      saveCart(); updateCartBadge(); renderCartPanel();
    });
  });
  
  var totalPrice=state.cart.reduce(function(a,x){
    return a+(parseFloat(x.price)||0)*x.qty;
  },0);
  $('cart-total-price').textContent=totalPrice>0?'$'+totalPrice.toFixed(0):'A consultar';
  $('cart-footer').style.display='block';
}

function buildWAMessage(){
  var msg='Hola! Me interesa hacer un pedido:\n\n';
  state.cart.forEach(function(item){
    msg+='• '+item.name+'\n';
    msg+='  Talla: '+item.size+', Cantidad: '+item.qty;
    if(item.price) msg+=' ($'+item.price+' c/u)';
    msg+='\n';
  });
  msg+='\nQuedo en espera de su confirmación 🙏';
  return msg;
}

/* ── EVENTS ── */
function attachEvents(){
  // Search
  $('search-input').addEventListener('input', function(){
    state.search=this.value; state.page=1; applyFilters();
  });
  
  // Sort
  $('sort-select').addEventListener('change', function(){
    state.sort=this.value; state.page=1; applyFilters();
  });
  
  // Cart
  $('btn-cart-open').addEventListener('click', function(){
    renderCartPanel(); $('cart-panel').classList.add('open');
  });
  $('btn-cart-close').addEventListener('click', function(){
    $('cart-panel').classList.remove('open');
  });
  
  // Modal
  $('modal-close').addEventListener('click', closeModal);
  $('modal').addEventListener('click', function(e){ if(e.target===$('modal')) closeModal(); });
  
  $('qty-minus').addEventListener('click', function(){
    if(state.modalQty>1){ state.modalQty--; $('qty-val').textContent=state.modalQty; }
  });
  $('qty-plus').addEventListener('click', function(){
    state.modalQty++; $('qty-val').textContent=state.modalQty;
  });
  
  $('modal-add-btn').addEventListener('click', function(){
    if(!state.modalProduct) return;
    addToCart(state.modalProduct, state.modalSize||'M', state.modalQty);
    showToast('✓ Agregado al carrito');
    closeModal();
  });
  
  // WhatsApp
  $('btn-whatsapp').addEventListener('click', function(){
    if(state.cart.length===0) return;
    var msg=buildWAMessage();
    window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
  });
  
  // Logout
  $('btn-logout').addEventListener('click', function(){
    try{ localStorage.removeItem('js_user'); }catch(e){}
    location.reload();
  });
}

/* ── ESCAPE ── */
function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s){
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── INIT ── */
attachEvents();
initLogin();
</script>
