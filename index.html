<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jersey Store | Catálogo Exclusivo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;
  --accent:#e63946;--accent2:#ff6b6b;
  --text:#f0f0f0;--muted:#8888aa;--border:#2a2a3a;
  --card:#1e1e28;--green:#2ecc71;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:radial-gradient(ellipse at top,#1a0a10 0%,#0f0f13 70%);
}
.login-box{
  background:rgba(26,26,34,0.97);border:1px solid var(--border);
  border-radius:24px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
}
.login-logo{text-align:center;margin-bottom:12px;font-size:48px}
.login-title{text-align:center;font-size:26px;font-weight:800;margin-bottom:4px;
  background:linear-gradient(135deg,#fff,#ffaaaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px}
.tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);
  border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.form-input{
  width:100%;padding:14px 16px;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;color:var(--text);
  font-size:16px;outline:none;transition:.2s;-webkit-appearance:none;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,57,70,.15)}
.btn-primary{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,var(--accent),#c0392b);
  color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(230,57,70,.4)}
.btn-primary:active{transform:translateY(0)}
.login-error{
  color:#ff6b6b;font-size:13px;text-align:center;
  min-height:20px;margin-top:10px;font-weight:500;
}
.login-help{color:var(--muted);font-size:12px;text-align:center;margin-top:16px;line-height:1.5}

/* ── APP ── */
#app{display:none;flex-direction:column;min-height:100vh}
.navbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;background:rgba(15,15,19,.95);
  border-bottom:1px solid var(--border);backdrop-filter:blur(10px);
}
.nav-brand{font-weight:800;font-size:18px;color:var(--accent)}
.nav-sub{font-size:12px;color:var(--muted);flex:1}
.nav-avatar{
  width:34px;height:34px;border-radius:50%;background:var(--accent);
  color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.btn-cart-nav{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;
}
.cart-count{
  background:var(--accent);color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.filters{
  padding:14px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.filter-search{
  flex:1;min-width:180px;padding:10px 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:14px;outline:none;
}
.filter-search:focus{border-color:var(--accent)}
.filter-select{
  padding:10px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:13px;outline:none;cursor:pointer;
}
.catalog{padding:16px 20px;display:grid;gap:16px;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));flex:1}
.card{
  background:var(--card);border-radius:16px;overflow:hidden;
  cursor:pointer;transition:.2s;border:1px solid var(--border);
}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);border-color:var(--accent)}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface2)}
.card-body{padding:10px 12px}
.card-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:6px}
.card-price{font-size:15px;font-weight:800;color:var(--accent)}
.card-badge{
  display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:20px;margin-bottom:6px;
}
.pagination{display:flex;justify-content:center;gap:8px;padding:20px;flex-wrap:wrap}
.page-btn{
  padding:8px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;cursor:pointer;
}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── CART PANEL ── */
.cart-panel{
  position:fixed;right:-360px;top:0;bottom:0;width:340px;max-width:92vw;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:300;transition:.3s;overflow-y:auto;padding:20px;
}
.cart-panel.open{right:0}
.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cart-header h3{font-size:18px;font-weight:700}
.btn-close{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px}
.cart-item{
  display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);
}
.cart-item img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--surface2)}
.cart-item-info{flex:1;font-size:13px}
.cart-item-name{font-weight:600;margin-bottom:2px}
.cart-item-detail{color:var(--muted);margin-bottom:4px}
.cart-item-price{color:var(--accent);font-weight:700}
.btn-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px}
.cart-total{font-size:16px;font-weight:700;padding:14px 0;text-align:right}
.btn-wa{
  width:100%;padding:14px;background:#25d366;color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:8px;
}
.btn-logout{
  width:100%;padding:10px;background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px;
}

/* ── MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:400;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--surface);border-radius:20px;max-width:480px;width:100%;
  max-height:85vh;overflow-y:auto;border:1px solid var(--border);
}
.modal-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:20px 20px 0 0;background:var(--surface2)}
.modal-body{padding:20px}
.modal-name{font-size:20px;font-weight:800;margin-bottom:4px}
.modal-price{font-size:24px;font-weight:800;color:var(--accent);margin-bottom:12px}
.modal-cat{font-size:13px;color:var(--muted);margin-bottom:16px}
.size-label{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
.size-opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.size-btn{
  padding:8px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;
}
.size-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qty-btn{
  width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:18px;cursor:pointer;
}
.qty-val{font-size:18px;font-weight:700;min-width:28px;text-align:center}
.btn-add{
  width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;
}
.modal-close{
  position:absolute;top:12px;right:12px;width:36px;height:36px;
  background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;
  font-size:20px;cursor:pointer;z-index:10;
}
.modal-box{position:relative}

/* ── ADMIN ── */
.admin-modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:500;align-items:center;justify-content:center;padding:20px;
}
.admin-modal.open{display:flex}
.admin-box{
  background:var(--surface);border-radius:20px;max-width:700px;width:100%;
  max-height:88vh;overflow-y:auto;padding:28px;border:1px solid var(--border);
}
.admin-title{font-size:22px;font-weight:800;margin-bottom:20px}
.admin-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:20px}
.admin-stat{background:var(--surface2);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border)}
.admin-stat-num{font-size:28px;font-weight:800;color:var(--accent)}
.admin-stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:8px;color:var(--muted);border-bottom:1px solid var(--border)}
.admin-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,.05)}
.admin-section{font-size:16px;font-weight:700;margin:20px 0 10px}
.btn-admin-close{
  width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:10px;font-size:14px;cursor:pointer;margin-top:16px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:#fff;padding:12px 24px;border-radius:50px;
  font-weight:700;z-index:9999;transition:.3s;font-size:14px;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .catalog{grid-template-columns:repeat(2,1fr);padding:12px;gap:10px}
  .login-box{padding:28px 20px}
  .navbar{padding:10px 14px}
}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚽</div>
    <div class="login-title">Jersey Store</div>
    <div class="login-sub">Catálogo exclusivo · Acceso con registro</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Entrar</button>
      <button class="tab-btn" id="tab-register" onclick="showTab('register')">Registrarse</button>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Número de teléfono</label>
        <input class="form-input" id="l-phone" type="tel" placeholder="Ej: 3343745531" inputmode="numeric"/>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="l-pass" type="password" placeholder="Tu contraseña"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Entrar al catálogo →</button>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input class="form-input" id="r-name" type="text" placeholder="Tu nombre"/>
      </div>
      <div class="form-group">
        <label class="form-label">Número de teléfono</label>
        <input class="form-input" id="r-phone" type="tel" placeholder="Ej: 3343745531" inputmode="numeric"/>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="r-pass" type="password" placeholder="Mín. 6 caracteres"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input class="form-input" id="r-pass2" type="password" placeholder="Repite tu contraseña"/>
      </div>
      <button class="btn-primary" onclick="doRegister()">Crear cuenta →</button>
    </div>

    <div class="login-error" id="login-error"></div>
    <div class="login-help">Para pedir: contacta por WhatsApp al finalizar tu selección</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- Navbar -->
  <nav class="navbar">
    <span class="nav-brand">⚽ Jerseys</span>
    <span class="nav-sub" id="nav-sub">Catálogo 2024-2026</span>
    <button class="btn-cart-nav" id="btn-cart-open">
      🛒 <span class="cart-count" id="cart-count">0</span>
    </button>
    <div class="nav-avatar" id="user-avatar" title="Cerrar sesión"></div>
  </nav>

  <!-- Filters -->
  <div class="filters">
    <input class="filter-search" id="search-input" type="search" placeholder="🔍 Buscar jersey..."/>
    <select class="filter-select" id="cat-select">
      <option value="all">Todas las categorías</option>
      <option value="Liga MX">Liga MX</option>
      <option value="Selecciones">Selecciones</option>
      <option value="Europa - Clubes">Europa - Clubes</option>
      <option value="Retro Europa">Retro Europa</option>
      <option value="Retro Liga MX">Retro Liga MX</option>
      <option value="Retros Barcelona">Retros Barcelona</option>
      <option value="Jackets">Jackets</option>
      <option value="Béisbol">Béisbol</option>
      <option value="Shorts">Shorts</option>
    </select>
    <select class="filter-select" id="sort-select">
      <option value="default">Orden default</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </div>

  <!-- Catalog grid -->
  <div class="catalog" id="catalog-grid"></div>
  <div class="pagination" id="pagination"></div>

</div>

<!-- ══ CART PANEL ══ -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h3>🛒 Tu carrito</h3>
    <button class="btn-close" id="btn-cart-close">✕</button>
  </div>
  <div id="cart-items"></div>
  <div class="cart-total" id="cart-total"></div>
  <button class="btn-wa" id="btn-whatsapp">📲 Pedir por WhatsApp</button>
  <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
</div>

<!-- ══ PRODUCT MODAL ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <img class="modal-img" id="modal-img" src="" alt="" loading="lazy"/>
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-cat" id="modal-cat"></div>
      <div class="size-label">Talla:</div>
      <div class="size-opts" id="modal-sizes"></div>
      <div class="qty-row">
        <button class="qty-btn" id="qty-minus">−</button>
        <span class="qty-val" id="qty-val">1</span>
        <button class="qty-btn" id="qty-plus">+</button>
      </div>
      <button class="btn-add" id="modal-add-btn">Agregar al carrito</button>
    </div>
  </div>
</div>

<!-- ══ ADMIN MODAL ══ -->
<div class="admin-modal" id="admin-modal">
  <div class="admin-box">
    <div class="admin-title">⚙️ Panel de Administración</div>
    <div class="admin-stats" id="admin-stats"></div>
    <div class="admin-section">👥 Usuarios registrados</div>
    <div id="admin-users"></div>
    <div class="admin-section">📋 Últimos accesos</div>
    <div id="admin-visits"></div>
    <button class="btn-admin-close" onclick="closeAdmin()">Cerrar</button>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ JS ══ -->
<script>
'use strict';

// ─── CONFIG ───────────────────────────────────────────────────────────
var ADMIN_PHONE = '3343745531';
var ADMIN_PASS  = '125670Carlos';
var ADMIN_NAME  = 'Carlos';
var WA_NUMBER   = '523343745531';
var ITEMS_PER_PAGE = 60;

// ─── BADGE COLORS ─────────────────────────────────────────────────────
var BADGE_MAP = {
  'Liga MX':          {bg:'#1a472a',color:'#2ecc71'},
  'Selecciones':      {bg:'#1a3a5c',color:'#5dade2'},
  'Europa - Clubes':  {bg:'#2d1b4e',color:'#9b59b6'},
  'Retro Europa':     {bg:'#4a2040',color:'#e91e8c'},
  'Retro Liga MX':    {bg:'#3d2000',color:'#f39c12'},
  'Retros Barcelona': {bg:'#3d0000',color:'#e74c3c'},
  'Jackets':          {bg:'#1a3333',color:'#1abc9c'},
  'Béisbol':          {bg:'#2a2a00',color:'#f1c40f'},
  'Shorts':           {bg:'#1a1a3a',color:'#a0a0ff'},
};

// ─── STATE ────────────────────────────────────────────────────────────
var S = {
  user: null,
  products: [],
  filtered: [],
  cart: [],
  page: 1,
  search: '',
  category: 'all',
  sort: 'default',
  modalProduct: null,
  modalSize: 'M',
  modalQty: 1,
};

// ─── UTILS ────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// ─── STORAGE ──────────────────────────────────────────────────────────
function getUsers(){ try{ return JSON.parse(localStorage.getItem('st_users')||'[]'); }catch(e){ return []; } }
function saveUsers(u){ try{ localStorage.setItem('st_users',JSON.stringify(u)); }catch(e){} }
function getVisits(){ try{ return JSON.parse(localStorage.getItem('st_visits')||'[]'); }catch(e){ return []; } }
function logVisit(phone,action){
  var v=getVisits();
  v.push({phone:phone,action:action,ts:Date.now()});
  if(v.length>500) v=v.slice(-500);
  try{ localStorage.setItem('st_visits',JSON.stringify(v)); }catch(e){}
}
function getCart(){ try{ return JSON.parse(localStorage.getItem('st_cart_'+( S.user?S.user.phone:''))||'[]'); }catch(e){ return []; } }
function saveCart(){ try{ localStorage.setItem('st_cart_'+(S.user?S.user.phone:''),JSON.stringify(S.cart)); }catch(e){} }

// ─── TABS ─────────────────────────────────────────────────────────────
function showTab(t){
  $('form-login').style.display    = t==='login'    ? '' : 'none';
  $('form-register').style.display = t==='register' ? '' : 'none';
  $('tab-login').classList.toggle('active',    t==='login');
  $('tab-register').classList.toggle('active', t==='register');
  $('login-error').textContent='';
}

// ─── LOGIN ────────────────────────────────────────────────────────────
function doLogin(){
  var phone = ($('l-phone').value||'').trim().replace(/\D/g,'');
  var pass  = ($('l-pass').value||'').trim();
  var err   = $('login-error');
  err.textContent='';
  if(!phone){ err.textContent='Ingresa tu número de teléfono'; return; }
  if(!pass){  err.textContent='Ingresa tu contraseña'; return; }

  // Admin
  if(phone===ADMIN_PHONE){
    if(pass!==ADMIN_PASS){ err.textContent='Contraseña incorrecta'; return; }
    startApp({phone:phone, name:ADMIN_NAME, isAdmin:true});
    return;
  }

  // Usuarios normales
  var users = getUsers();
  var u = users.find(function(x){ return x.phone===phone; });
  if(!u){ err.textContent='Número no registrado. Regístrate primero.'; return; }
  if(u.pass !== btoa(pass)){ err.textContent='Contraseña incorrecta'; return; }
  u.lastLogin = Date.now();
  saveUsers(users);
  startApp({phone:phone, name:u.name});
}

// ─── REGISTER ─────────────────────────────────────────────────────────
function doRegister(){
  var name  = ($('r-name').value||'').trim();
  var phone = ($('r-phone').value||'').trim().replace(/\D/g,'');
  var pass  = ($('r-pass').value||'').trim();
  var pass2 = ($('r-pass2').value||'').trim();
  var err   = $('login-error');
  err.textContent='';
  if(!name){              err.textContent='Ingresa tu nombre'; return; }
  if(!phone){             err.textContent='Ingresa tu número de teléfono'; return; }
  if(phone.length<8){     err.textContent='Número muy corto'; return; }
  if(!pass){              err.textContent='Ingresa una contraseña'; return; }
  if(pass.length<6){      err.textContent='La contraseña debe tener al menos 6 caracteres'; return; }
  if(pass!==pass2){       err.textContent='Las contraseñas no coinciden'; return; }
  if(phone===ADMIN_PHONE){ err.textContent='Número no disponible'; return; }

  var users = getUsers();
  if(users.find(function(x){ return x.phone===phone; })){
    err.textContent='Ese número ya está registrado. Inicia sesión.';
    return;
  }
  users.push({phone:phone, name:name, pass:btoa(pass), createdAt:Date.now(), lastLogin:null});
  saveUsers(users);
  logVisit(phone,'register');
  showToast('¡Cuenta creada! Entrando...');
  setTimeout(function(){ startApp({phone:phone, name:name}); }, 800);
}

// ─── START APP ────────────────────────────────────────────────────────
function startApp(user){
  S.user = user;
  try{ localStorage.setItem('st_session', JSON.stringify({phone:user.phone,name:user.name,isAdmin:!!user.isAdmin})); }catch(e){}
  logVisit(user.phone, user.isAdmin ? 'admin-login' : 'login');

  // Ocultar login, mostrar app
  $('login-screen').style.display='none';
  $('app').style.display='flex';

  // Avatar
  var initials=(user.name||'').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||user.phone.slice(-2);
  $('user-avatar').textContent=initials;
  $('nav-sub').textContent=user.isAdmin?'⚙ Administrador':'Catálogo 2024-2026';

  // Botón admin en navbar si es admin
  if(user.isAdmin){
    var btn=document.createElement('button');
    btn.className='btn-cart-nav';
    btn.innerHTML='⚙️';
    btn.onclick=openAdmin;
    $('user-avatar').parentNode.insertBefore(btn, $('user-avatar'));
  }

  // Cargar carrito y catálogo
  S.cart = getCart();
  updateCartCount();
  attachEvents();
  initCatalog();
}

// ─── EVENTS ───────────────────────────────────────────────────────────
function attachEvents(){
  $('search-input').addEventListener('input', function(){ S.search=this.value; S.page=1; applyFilters(); });
  $('cat-select').addEventListener('change',  function(){ S.category=this.value; S.page=1; applyFilters(); });
  $('sort-select').addEventListener('change', function(){ S.sort=this.value; S.page=1; applyFilters(); });
  $('btn-cart-open').addEventListener('click',  function(){ renderCart(); $('cart-panel').classList.add('open'); });
  $('btn-cart-close').addEventListener('click', function(){ $('cart-panel').classList.remove('open'); });
  $('modal-close').addEventListener('click', closeModal);
  $('modal').addEventListener('click',       function(e){ if(e.target===$('modal')) closeModal(); });
  $('qty-minus').addEventListener('click', function(){ if(S.modalQty>1){ S.modalQty--; $('qty-val').textContent=S.modalQty; } });
  $('qty-plus').addEventListener('click',  function(){ S.modalQty++; $('qty-val').textContent=S.modalQty; });
  $('modal-add-btn').addEventListener('click', function(){
    if(!S.modalProduct) return;
    addToCart(S.modalProduct, S.modalSize||'M', S.modalQty);
    showToast('✓ Agregado al carrito');
    closeModal();
  });
  $('btn-whatsapp').addEventListener('click', sendWA);
  $('btn-logout').addEventListener('click', doLogout);
  $('user-avatar').addEventListener('click', doLogout);
}

// ─── CATALOG ──────────────────────────────────────────────────────────
function initCatalog(){
  var seed = window.CATALOG_SEED||[];
  S.products = seed.map(function(p,i){
    return {
      id:    p.id||i+1,
      name:  p.name||p.n||'Jersey',
      image: p.image||p.img||'',
      thumb: p.image_thumb||p.thumb||p.image||p.img||'',
      price: p.price||p.precio||'$350 MXN',
      cat:   p.category||p.cat||p.categoria||'',
      sizes: p.sizes||p.tallas||['S','M','L','XL','2XL'],
    };
  });
  applyFilters();
}

function applyFilters(){
  var prods = S.products.slice();
  if(S.category !== 'all'){
    prods = prods.filter(function(p){ return p.cat===S.category; });
  }
  if(S.search){
    var q = S.search.toLowerCase();
    prods = prods.filter(function(p){ return p.name.toLowerCase().includes(q) || (p.cat||'').toLowerCase().includes(q); });
  }
  if(S.sort==='az') prods.sort(function(a,b){ return a.name.localeCompare(b.name); });
  if(S.sort==='za') prods.sort(function(a,b){ return b.name.localeCompare(a.name); });
  S.filtered = prods;
  S.page = Math.min(S.page, Math.max(1, Math.ceil(prods.length/ITEMS_PER_PAGE)));
  renderGrid();
  renderPagination();
}

function renderGrid(){
  var start = (S.page-1)*ITEMS_PER_PAGE;
  var page  = S.filtered.slice(start, start+ITEMS_PER_PAGE);
  var grid  = $('catalog-grid');
  if(!page.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">No se encontraron jerseys</div>';
    return;
  }
  grid.innerHTML = page.map(function(p){
    var b = BADGE_MAP[p.cat]||{bg:'#222',color:'#aaa'};
    return '<div class="card" onclick="openModal('+p.id+')">'+
      '<img class="card-img" src="'+esc(p.thumb||p.image)+'" alt="'+esc(p.name)+'" loading="lazy"'+
      ' onerror="this.src=\\'data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'160\\' height=\\'160\\'><rect width=\\'160\\' height=\\'160\\' fill=\\'%231e1e28\\'/>'+
      '<text x=\\'80\\' y=\\'85\\' text-anchor=\\'middle\\' font-size=\\'32\\'>⚽</text></svg>\\'" />'+
      '<div class="card-body">'+
      (p.cat?'<span class="card-badge" style="background:'+b.bg+';color:'+b.color+'">'+esc(p.cat)+'</span>':'')+'<br>'+
      '<div class="card-name">'+esc(p.name)+'</div>'+
      '<div class="card-price">'+esc(p.price)+'</div>'+
      '</div></div>';
  }).join('');
}

function renderPagination(){
  var total = Math.ceil(S.filtered.length/ITEMS_PER_PAGE);
  if(total<=1){ $('pagination').innerHTML=''; return; }
  var pages=[];
  // Siempre mostrar primera, última y entorno a la actual
  var show=new Set([1,total]);
  for(var i=Math.max(1,S.page-2);i<=Math.min(total,S.page+2);i++) show.add(i);
  var sorted=Array.from(show).sort(function(a,b){return a-b;});
  var html='';
  var prev=-1;
  for(var j=0;j<sorted.length;j++){
    var n=sorted[j];
    if(prev>0 && n-prev>1) html+='<span style="color:var(--muted);padding:8px">…</span>';
    html+='<button class="page-btn'+(n===S.page?' active':'')+'" onclick="gotoPage('+n+')">'+n+'</button>';
    prev=n;
  }
  $('pagination').innerHTML=html;
}

function gotoPage(n){ S.page=n; renderGrid(); renderPagination(); window.scrollTo(0,0); }

// ─── MODAL ────────────────────────────────────────────────────────────
function openModal(id){
  var p = S.products.find(function(x){ return x.id===id; });
  if(!p) return;
  S.modalProduct=p; S.modalSize='M'; S.modalQty=1;
  $('modal-img').src   = p.image||p.thumb||'';
  $('modal-name').textContent  = p.name;
  $('modal-price').textContent = p.price;
  $('modal-cat').textContent   = p.cat||'';
  $('qty-val').textContent = '1';
  var sizes = p.sizes||['S','M','L','XL','2XL'];
  $('modal-sizes').innerHTML = sizes.map(function(s){
    return '<button class="size-btn'+(s==='M'?' sel':'')+'" onclick="selSize(this,\''+s+'\')">'+s+'</button>';
  }).join('');
  $('modal').classList.add('open');
}
function selSize(btn,s){
  S.modalSize=s;
  document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
}
function closeModal(){ $('modal').classList.remove('open'); }

// ─── CART ─────────────────────────────────────────────────────────────
function addToCart(p,size,qty){
  var key=p.id+'_'+size;
  var item=S.cart.find(function(x){ return x.key===key; });
  if(item){ item.qty+=qty; }
  else{ S.cart.push({key:key,id:p.id,name:p.name,image:p.thumb||p.image,price:p.price,size:size,qty:qty}); }
  saveCart(); updateCartCount();
}
function updateCartCount(){
  var n=S.cart.reduce(function(a,x){return a+x.qty;},0);
  $('cart-count').textContent=n;
}
function renderCart(){
  var el=$('cart-items');
  if(!S.cart.length){ el.innerHTML='<div style="color:var(--muted);text-align:center;padding:30px">Tu carrito está vacío</div>'; $('cart-total').textContent=''; return; }
  el.innerHTML=S.cart.map(function(item,i){
    return '<div class="cart-item">'+
      '<img src="'+esc(item.image)+'" alt="" onerror="this.style.display=\'none\'"/>'+
      '<div class="cart-item-info">'+
        '<div class="cart-item-name">'+esc(item.name)+'</div>'+
        '<div class="cart-item-detail">Talla: '+esc(item.size)+' · Cant: '+item.qty+'</div>'+
        '<div class="cart-item-price">'+esc(item.price)+'</div>'+
      '</div>'+
      '<button class="btn-remove" onclick="removeItem('+i+')">🗑</button>'+
    '</div>';
  }).join('');
  $('cart-total').textContent='Total: '+S.cart.length+' artículo(s)';
}
function removeItem(i){ S.cart.splice(i,1); saveCart(); updateCartCount(); renderCart(); }
function sendWA(){
  if(!S.cart.length){ showToast('Tu carrito está vacío'); return; }
  var msg='Hola! Quiero pedir los siguientes jerseys:\n\n';
  S.cart.forEach(function(x){ msg+='• '+x.name+' - Talla '+x.size+' x'+x.qty+'\n'; });
  msg+='\n¿Tienen disponibilidad? 🙏';
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
}

// ─── LOGOUT ───────────────────────────────────────────────────────────
function doLogout(){
  S.user=null; S.cart=[];
  try{ localStorage.removeItem('st_session'); }catch(e){}
  $('app').style.display='none';
  $('login-screen').style.display='flex';
  $('l-phone').value=''; $('l-pass').value='';
  $('login-error').textContent='';
  showTab('login');
}

// ─── ADMIN ────────────────────────────────────────────────────────────
function openAdmin(){
  var users  = getUsers();
  var visits = getVisits();
  var today  = new Date().toDateString();
  var todayN = visits.filter(function(v){ return new Date(v.ts).toDateString()===today; }).length;
  $('admin-stats').innerHTML=
    '<div class="admin-stat"><div class="admin-stat-num">'+users.length+'</div><div class="admin-stat-label">Usuarios</div></div>'+
    '<div class="admin-stat"><div class="admin-stat-num">'+visits.length+'</div><div class="admin-stat-label">Accesos totales</div></div>'+
    '<div class="admin-stat"><div class="admin-stat-num">'+todayN+'</div><div class="admin-stat-label">Accesos hoy</div></div>'+
    '<div class="admin-stat"><div class="admin-stat-num">'+S.products.length+'</div><div class="admin-stat-label">Productos</div></div>';

  var uEl=$('admin-users');
  if(!users.length){ uEl.innerHTML='<p style="color:var(--muted);padding:12px">Sin usuarios aún</p>'; }
  else{
    uEl.innerHTML='<table class="admin-table"><thead><tr><th>Teléfono</th><th>Nombre</th><th>Registro</th><th>Último acceso</th></tr></thead><tbody>'+
      users.slice().reverse().map(function(u){
        return '<tr><td>'+esc(u.phone)+'</td><td>'+esc(u.name)+'</td><td>'+
          (u.createdAt?new Date(u.createdAt).toLocaleDateString('es-MX'):'?')+'</td><td>'+
          (u.lastLogin?new Date(u.lastLogin).toLocaleDateString('es-MX'):'Nunca')+'</td></tr>';
      }).join('')+'</tbody></table>';
  }
  var vEl=$('admin-visits');
  var last=visits.slice(-20).reverse();
  if(!last.length){ vEl.innerHTML='<p style="color:var(--muted);padding:12px">Sin accesos aún</p>'; }
  else{
    vEl.innerHTML='<table class="admin-table"><thead><tr><th>Teléfono</th><th>Acción</th><th>Fecha</th></tr></thead><tbody>'+
      last.map(function(v){
        return '<tr><td>'+esc(v.phone)+'</td><td>'+esc(v.action)+'</td><td>'+new Date(v.ts).toLocaleString('es-MX')+'</td></tr>';
      }).join('')+'</tbody></table>';
  }
  $('admin-modal').classList.add('open');
}
function closeAdmin(){ $('admin-modal').classList.remove('open'); }

// ─── INIT ─────────────────────────────────────────────────────────────
(function init(){
  // Restaurar sesión guardada
  try{
    var saved = localStorage.getItem('st_session');
    if(saved){
      var u = JSON.parse(saved);
      if(u && u.phone){ startApp(u); return; }
    }
  }catch(e){ localStorage.removeItem('st_session'); }
  // Sin sesión guardada: mostrar login
})();
</script>
